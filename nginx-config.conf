# Seoul Skin Archive Nginx 설정
# 위치: /etc/nginx/sites-available/seoulskinarchive
# 심볼릭 링크: ln -s /etc/nginx/sites-available/seoulskinarchive /etc/nginx/sites-enabled/

# Rate limiting zones (main nginx.conf에 이미 있다면 생략)
# http {
#   limit_req_zone $binary_remote_addr zone=general:10m rate=20r/s;
#   limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
# }

# ─────────────────────────────────────────────────────────────
# HTTP → HTTPS 리다이렉트
# ─────────────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name seoulskinarchive.com blog.seoulskinarchive.com;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # 모든 요청을 HTTPS로 리다이렉트
    location / {
        return 301 https://$host$request_uri;
    }
}

# ─────────────────────────────────────────────────────────────
# HTTPS - Seoul Skin Archive
# ─────────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name seoulskinarchive.com www.seoulskinarchive.com;

    # SSL 인증서
    ssl_certificate /etc/letsencrypt/live/seoulskinarchive.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/seoulskinarchive.com/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/seoulskinarchive.com/chain.pem;

    # SSL 설정
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_stapling on;
    ssl_stapling_verify on;

    # 보안 헤더
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https://yurasis.com https://*.supabase.co;" always;

    # Rate limiting (주석 처리 - zone 미설정)
    # limit_req zone=general burst=40 nodelay;

    # Gzip 압축
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/json application/xml+rss;

    # Next.js 앱으로 프록시
    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 90s;
    }

    # Next.js 정적 파일 캐싱 (_next/static/)
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # 이미지 최적화 캐싱
    location ~* \.(jpg|jpeg|png|gif|webp|svg|ico)$ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=2592000"; # 30일
    }
}

# ─────────────────────────────────────────────────────────────
# HTTPS - Blog Subdomain
# ─────────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name blog.seoulskinarchive.com;

    # SSL 인증서 (와일드카드 또는 별도 인증서)
    ssl_certificate /etc/letsencrypt/live/seoulskinarchive.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/seoulskinarchive.com/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/seoulskinarchive.com/chain.pem;

    # SSL 설정 (위와 동일)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;

    # 보안 헤더 (위와 동일)
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;

    # /blog로 리다이렉트
    return 301 https://seoulskinarchive.com/blog$request_uri;
}
